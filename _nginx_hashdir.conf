# Nginx config for hash-directory structure
# Add to server block for master-stilya.vercel.app:
location / {
    root /var/www/master-stilya.vercel.app;
    try_files $uri $uri/ @hashdir;
}
location @hashdir {
    root /var/www/master-stilya.vercel.app;
    rewrite ^/([a-z0-9])([a-z0-9])(.+\.html)$ /$1/$1$2/$1$2$3 last;
}